name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile all Python files
        run: |
          python - <<'PY'
          from pathlib import Path
          import py_compile
          failed = []
          for p in Path('.').rglob('*.py'):
              if '.git' in p.parts:
                  continue
              try:
                  py_compile.compile(str(p), doraise=True)
              except Exception as e:
                  failed.append((str(p), repr(e)))
          if failed:
              for f, e in failed:
                  print(f, e)
              raise SystemExit(1)
          print("all python files compile")
          PY
      - name: Check executable bits
        run: |
          test -x install/install.sh
          test -x scripts/x_nft_mint_radar_general.sh
          test -x scripts/x_nft_mint_radar_wl.sh
          test -x scripts/waypoint_hot_mint_radar.sh
      - name: Secret scan sanity
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          patterns = [
              ("hex_secret", re.compile(r"\b0x[a-fA-F0-9]{64}\b")),
              ("telegram_token", re.compile(r"\b[0-9]{8,12}:[A-Za-z0-9_-]{30,}\b")),
              ("github_pat", re.compile(r"\bgh[pousr]_[A-Za-z0-9_]{20,}\b")),
              ("openai_key", re.compile(r"\bsk-[A-Za-z0-9]{20,}\b")),
              ("env_secret", re.compile(r"\b(X_AUTH_TOKEN|X_CT0|PRIVATE_KEY|MNEMONIC|SEED_PHRASE|TELEGRAM_BOT_TOKEN)\s*=\s*\S+")),
          ]
          allow_substrings = [
              "_EIP1967_IMPL_SLOT",
              "export PRIVATE_KEY=0x...",
              "PRIVATE_KEY=your_",
              "MNEMONIC=your_",
              "SEED_PHRASE=your_",
              "TELEGRAM_BOT_TOKEN=your_",
          ]
          failed = []
          for p in Path('.').rglob('*'):
              if '.git' in p.parts or not p.is_file() or p.suffix == '.md':
                  continue
              try:
                  text = p.read_text(errors='ignore')
              except Exception:
                  continue
              for lineno, line in enumerate(text.splitlines(), 1):
                  if any(s in line for s in allow_substrings):
                      continue
                  for name, pattern in patterns:
                      if pattern.search(line):
                          failed.append(f"{p}:{lineno}: {name}: {line[:160]}")
          if failed:
              print("Potential secrets found:")
              print("\n".join(failed))
              raise SystemExit(1)
          print("secret scan passed")
          PY
